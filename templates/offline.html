<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b58">
  <title>ما كاينش إنترنت · dwi.ma</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
      background: #fafaf9;
      color: #292524;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image:
        linear-gradient(30deg, #0d7963 12%, transparent 12.5%, transparent 87%, #0d7963 87.5%),
        linear-gradient(150deg, #0d7963 12%, transparent 12.5%, transparent 87%, #0d7963 87.5%),
        linear-gradient(30deg, #0d7963 12%, transparent 12.5%, transparent 87%, #0d7963 87.5%),
        linear-gradient(150deg, #0d7963 12%, transparent 12.5%, transparent 87%, #0d7963 87.5%),
        linear-gradient(60deg, #f5a623 25%, transparent 25.5%, transparent 75%, #f5a623 75%),
        linear-gradient(60deg, #f5a623 25%, transparent 25.5%, transparent 75%, #f5a623 75%);
      background-size: 40px 70px;
      background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
      pointer-events: none;
    }

    .container {
      position: relative;
      text-align: center;
      max-width: 380px;
      padding: 2rem 1.5rem;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Signal icon with animated waves */
    .signal {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .signal-core {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #d4d1cc;
      z-index: 2;
    }
    .signal-wave {
      position: absolute;
      border: 2.5px solid #d4d1cc;
      border-radius: 50%;
      animation: wavePulse 2.4s ease-out infinite;
    }
    .signal-wave:nth-child(2) { width: 40px; height: 40px; animation-delay: 0s; }
    .signal-wave:nth-child(3) { width: 60px; height: 60px; animation-delay: 0.4s; }
    .signal-wave:nth-child(4) { width: 80px; height: 80px; animation-delay: 0.8s; }

    @keyframes wavePulse {
      0% { opacity: 0.5; transform: scale(0.8); }
      50% { opacity: 0.2; }
      100% { opacity: 0; transform: scale(1.1); }
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0b6b58;
      margin-bottom: 1.5rem;
      line-height: 1;
    }
    .brand-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f5a623;
      margin: 0 1px;
      vertical-align: middle;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1c1917;
      margin-bottom: 0.5rem;
    }
    .desc {
      font-size: 0.9375rem;
      line-height: 1.65;
      color: #78716c;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      background: #0b6b58;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      min-height: 48px;
      width: 100%;
      max-width: 260px;
    }
    .btn:hover { background: #085a49; }
    .btn:active { transform: scale(0.97); }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.8125rem;
      color: #a8a29e;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="brand">dwi<span class="brand-dot"></span>ma</div>

    <!-- Signal waves animation -->
    <div class="signal">
      <div class="signal-core"></div>
      <div class="signal-wave"></div>
      <div class="signal-wave"></div>
      <div class="signal-wave"></div>
    </div>

    <h1>ما كاينش إنترنت</h1>
    <p class="desc">
      خاصك تكون متصل بالإنترنت باش تستعمل dwi.ma.<br>
      شوف الاتصال ديالك و عاود جرب.
    </p>

    <button class="btn" onclick="location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      عاود جرب
    </button>

    <p class="hint">ملي ترجع الكونيكسيون، الصفحة غادي تخدم عادي.</p>
  </div>
</body>
</html>
