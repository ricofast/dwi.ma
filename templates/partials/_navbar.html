{% load static %}
<header class="dw-navbar">
  <a href="{% url 'dashboard' %}" class="dw-navbar-brand">
    dwi<span class="dw-brand-dot"></span>ma
  </a>

  <div class="dw-navbar-end">
    {% if user.is_authenticated %}
      {% include "partials/_credit_balance_pill.html" %}
    <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
      <button class="dw-btn dw-btn-ghost dw-btn-sm" type="submit">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </form>
    {% else %}
      <a href="{% url 'accounts:login' %}" class="dw-btn dw-btn-primary dw-btn-sm">دخل</a>
    {% endif %}
  </div>
</header>
