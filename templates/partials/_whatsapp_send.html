{% comment %}
"Send to WhatsApp" button.
Usage: {% include "partials/_whatsapp_send.html" with job_id=job.id %}
Opens an Alpine modal to confirm the WhatsApp number before sending.
{% endcomment %}
<div x-data="{ open: false, phone: '', sending: false, done: false }" style="flex:1;">
  <button type="button" @click="open = true" class="dw-btn dw-btn-primary dw-btn-block" :disabled="done"
          style="background:#25D366;border:none;" x-text="done ? 'تصيفط' : 'صيفط للواتساب'">
    صيفط للواتساب
  </button>

  <!-- Modal overlay -->
  <div x-show="open" x-cloak
       style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1080;display:flex;align-items:flex-end;justify-content:center;"
       @click.self="open = false">
    <div style="background:#fff;border-radius:var(--dw-radius-xl) var(--dw-radius-xl) 0 0;width:100%;max-width:480px;padding:1.5rem;padding-bottom:calc(1.5rem + env(safe-area-inset-bottom, 0px));"
         @click.stop
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="transform translate-y-full opacity-0"
         x-transition:enter-end="transform translate-y-0 opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="transform translate-y-0 opacity-100"
         x-transition:leave-end="transform translate-y-full opacity-0">

      <div class="dw-row" style="justify-content:space-between;margin-bottom:1rem;">
        <h3 style="margin:0;font-size:1.0625rem;font-weight:600;color:var(--dw-gray-900);">صيفط النتيجة للواتساب</h3>
        <button type="button" @click="open = false" style="background:none;border:none;cursor:pointer;padding:0.25rem;color:var(--dw-gray-400);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="dw-form-group">
        <label class="dw-form-label" for="wa-phone">رقم الواتساب</label>
        <input type="tel" id="wa-phone" x-model="phone" class="dw-input" dir="ltr"
               placeholder="06XXXXXXXX" inputmode="tel" autocomplete="tel">
        <p class="dw-form-hint">دخل الرقم ديالك ولا ديال شي حد آخر</p>
      </div>

      <button type="button"
              class="dw-btn dw-btn-block dw-btn-lg"
              style="background:#25D366;color:#fff;border:none;"
              :disabled="phone.length < 8 || sending"
              @click="
                sending = true;
                fetch('/api/whatsapp/send-result/', {
                  method: 'POST',
                  headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''},
                  body: JSON.stringify({job_id: '{{ job_id }}', phone_number: phone})
                }).then(function() { sending = false; done = true; open = false; })
                  .catch(function() { sending = false; });
              ">
        <template x-if="!sending">
          <span class="dw-row dw-gap-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            صيفط
          </span>
        </template>
        <template x-if="sending">
          <span class="dw-row dw-gap-sm"><div class="dw-spinner dw-spinner-sm" style="border-top-color:#fff;border-color:rgba(255,255,255,0.3);"></div> كيتصيفط...</span>
        </template>
      </button>
    </div>
  </div>
</div>
