{% comment %}
User feedback buttons for AI results.
Usage: {% include "partials/_feedback_buttons.html" with job_id=job.id %}
Submits rating via HTMX POST.
{% endcomment %}
<div id="feedback-{{ job_id }}" x-data="{ sent: false }">
  <template x-if="!sent">
    <div class="dw-card" style="text-align:center;">
      <p class="dw-label" style="margin:0 0 0.625rem;">واش هاد النتيجة عجباتك؟</p>
      <div class="dw-row" style="justify-content:center;gap:0.5rem;flex-wrap:wrap;">
        <button type="button" class="dw-btn dw-btn-outline dw-btn-sm"
                @click="sent = true"
                hx-post="/api/assistant/jobs/{{ job_id }}/feedback/"
                hx-vals='{"rating": "helpful"}'
                hx-swap="none">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dw-success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
          مفيد
        </button>
        <button type="button" class="dw-btn dw-btn-outline dw-btn-sm"
                @click="sent = true"
                hx-post="/api/assistant/jobs/{{ job_id }}/feedback/"
                hx-vals='{"rating": "unclear"}'
                hx-swap="none">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dw-warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          غير واضح
        </button>
        <button type="button" class="dw-btn dw-btn-outline dw-btn-sm"
                @click="sent = true"
                hx-post="/api/assistant/jobs/{{ job_id }}/feedback/"
                hx-vals='{"rating": "wrong"}'
                hx-swap="none">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dw-danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          خطأ
        </button>
      </div>
    </div>
  </template>
  <template x-if="sent">
    <div class="dw-card" style="text-align:center;background:var(--dw-teal-50);border-color:var(--dw-teal-200);">
      <p style="margin:0;font-size:0.875rem;font-weight:500;color:var(--dw-teal-700);">شكرا على رأيك!</p>
    </div>
  </template>
</div>
