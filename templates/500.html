<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b58">
  <title>500 — مشكلة تقنية · dwi.ma</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
      background: #1c1917;
      color: #e8e6e3;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        linear-gradient(rgba(255,255,255,.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .container {
      position: relative;
      text-align: center;
      max-width: 400px;
      padding: 2rem 1.5rem;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Wrench/gear animation */
    .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(245,166,35,0.1);
      border: 2px solid rgba(245,166,35,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      position: relative;
    }
    .icon-wrap svg {
      width: 40px;
      height: 40px;
      color: #f5a623;
      animation: wrenchWiggle 2.5s ease-in-out infinite;
      transform-origin: center center;
    }
    @keyframes wrenchWiggle {
      0%, 100% { transform: rotate(0deg); }
      15% { transform: rotate(-12deg); }
      30% { transform: rotate(8deg); }
      45% { transform: rotate(-4deg); }
      55% { transform: rotate(0deg); }
    }

    /* Pulsing ring */
    .icon-wrap::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1.5px solid rgba(245,166,35,0.15);
      animation: ringPulse 2s ease-out infinite;
    }
    @keyframes ringPulse {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.25); opacity: 0; }
    }

    .code {
      font-size: 3.5rem;
      font-weight: 700;
      color: #f5a623;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
      text-shadow: 0 0 40px rgba(245,166,35,0.2);
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f3f2f0;
      margin-bottom: 0.5rem;
    }
    .desc {
      font-size: 0.9375rem;
      line-height: 1.65;
      color: #a8a29e;
      margin-bottom: 1.75rem;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      width: 100%;
      max-width: 280px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      background: #f5a623;
      color: #1c1917;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      min-height: 48px;
    }
    .btn:hover { background: #ffca28; }
    .btn:active { transform: scale(0.97); }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #44403c;
      color: #a8a29e;
    }
    .btn-outline:hover { border-color: #78716c; color: #e8e6e3; background: rgba(255,255,255,0.03); }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #57534e;
    }
    .footer a {
      color: #78716c;
      text-decoration: none;
    }
    .footer a:hover { color: #f5a623; }
  </style>
</head>
<body>
  <div class="container">

    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <div class="code">500</div>
    <h1>كاين مشكلة تقنية</h1>
    <p class="desc">
      السيرفر ما قدرش يعالج الطلب ديالك دابا.<br>
      الفريق عارف و كيصلح المشكلة.
    </p>

    <div class="actions">
      <a href="/" class="btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        رجع للرئيسية
      </a>
      <button class="btn btn-outline" onclick="location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        جرب مرة أخرى
      </button>
    </div>

    <div class="footer">
      <p>dwi<span style="color:#f5a623;">.</span>ma — إلا تكررات المشكلة راسلنا على <a href="mailto:support@dwi.ma">support@dwi.ma</a></p>
    </div>
  </div>
</body>
</html>
