{% load static %}<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b58">
  <title>404 — الصفحة ما لقيناهاش · dwi.ma</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'icons/icon-192.svg' %}">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
      background: #fafaf9;
      color: #292524;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Zellige background pattern */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image:
        linear-gradient(30deg, #0d7963 12%, transparent 12.5%, transparent 87%, #0d7963 87.5%),
        linear-gradient(150deg, #0d7963 12%, transparent 12.5%, transparent 87%, #0d7963 87.5%),
        linear-gradient(30deg, #0d7963 12%, transparent 12.5%, transparent 87%, #0d7963 87.5%),
        linear-gradient(150deg, #0d7963 12%, transparent 12.5%, transparent 87%, #0d7963 87.5%),
        linear-gradient(60deg, #f5a623 25%, transparent 25.5%, transparent 75%, #f5a623 75%),
        linear-gradient(60deg, #f5a623 25%, transparent 25.5%, transparent 75%, #f5a623 75%);
      background-size: 40px 70px;
      background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
      pointer-events: none;
    }

    .container {
      position: relative;
      text-align: center;
      max-width: 400px;
      padding: 2rem 1.5rem;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Door illustration — a Moroccan riad door that's slightly ajar */
    .door-frame {
      width: 120px;
      height: 160px;
      margin: 0 auto 2rem;
      position: relative;
    }
    .door-arch {
      width: 100%;
      height: 100%;
      border: 4px solid #0b6b58;
      border-radius: 60px 60px 0 0;
      position: relative;
      overflow: hidden;
      background: #e6f5f3;
    }
    .door-panel {
      position: absolute;
      top: 40px;
      right: 8px;
      width: calc(50% - 10px);
      height: calc(100% - 48px);
      background: #0b6b58;
      border-radius: 4px;
      transform-origin: right center;
      animation: doorCreak 3s ease-in-out infinite alternate;
    }
    .door-panel-left {
      right: auto;
      left: 8px;
      transform-origin: left center;
      background: #085a49;
    }
    .door-knob {
      position: absolute;
      top: 50%;
      left: 4px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffca28;
    }
    .door-knob-right {
      left: auto;
      right: 4px;
    }
    .door-star {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 24px;
    }
    .door-star svg { width: 100%; height: 100%; }

    @keyframes doorCreak {
      0% { transform: perspective(200px) rotateY(0deg); }
      100% { transform: perspective(200px) rotateY(-15deg); }
    }

    .code {
      font-size: 4rem;
      font-weight: 700;
      color: #0b6b58;
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
    }
    .code span {
      display: inline-block;
      color: #f5a623;
      animation: bounce404 2s ease-in-out infinite;
    }
    @keyframes bounce404 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1c1917;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: #57534e;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      background: #0b6b58;
      color: #fff;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      min-height: 48px;
    }
    .btn:hover { background: #085a49; }
    .btn:active { transform: scale(0.97); }

    .link {
      display: block;
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: #78716c;
      text-decoration: none;
    }
    .link:hover { color: #0b6b58; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Moroccan door illustration -->
    <div class="door-frame">
      <div class="door-arch">
        <div class="door-star">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9" fill="#ffca28" opacity="0.6"/>
          </svg>
        </div>
        <div class="door-panel">
          <div class="door-knob door-knob-right"></div>
        </div>
        <div class="door-panel door-panel-left">
          <div class="door-knob"></div>
        </div>
      </div>
    </div>

    <div class="code">4<span>0</span>4</div>
    <h1>هاد الصفحة ما لقيناهاش</h1>
    <p>يمكن الرابط تبدل ولا الصفحة تمسحات.<br>ما تقلقش، رجع للرئيسية و كمل.</p>

    <a href="/" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      رجع للرئيسية
    </a>
    {% if request.user.is_authenticated %}
    <a href="/dashboard/" class="link">ولا مشي للداشبورد</a>
    {% endif %}
  </div>
</body>
</html>
