{% extends "base_auth.html" %}
{% block title %}كتب ليا رسالة · dwi.ma{% endblock %}

{% block content %}
<div class="dw-stack dw-gap-lg">

  <section class="dw-fade-in">
    <h1 class="dw-display-sm" style="margin:0;">كتب ليا رسالة</h1>
    <p class="dw-body" style="margin:0.25rem 0 0;">قول شنو بغيتي بدارجة و dwi.ma يكتبها ليك بطريقة مهنية</p>
  </section>

  <form method="post" class="dw-stack dw-gap-md dw-fade-in dw-stagger-1">
    {% csrf_token %}

    <!-- Input text -->
    <div class="dw-form-group" style="margin:0;">
      <label class="dw-form-label" for="id_input_text">شنو بغيتي تقول؟</label>
      <textarea id="id_input_text" name="input_text" class="dw-input" rows="6" required
                placeholder="مثلا: بغيت نطلب عطلة من الخدمة، من 15 يونيو حتى 30 يونيو..."
                style="line-height:1.65;">{{ request.POST.input_text }}</textarea>
    </div>

    <!-- Target format -->
    <div class="dw-form-group" style="margin:0;">
      <label class="dw-form-label">نوع الرسالة</label>
      <div class="dw-stack dw-gap-xs" style="margin-top:0.375rem;">

        <label class="dw-card dw-card-interactive dw-row dw-gap-md" style="padding:0.875rem 1rem;margin:0;cursor:pointer;">
          <input type="radio" name="target_format" value="professional_french_email" checked
                 style="width:20px;height:20px;accent-color:var(--dw-teal-600);flex-shrink:0;">
          <div>
            <p style="margin:0;font-size:0.875rem;font-weight:600;color:var(--dw-gray-800);">إيميل مهني بالفرنسية</p>
            <p style="margin:0;font-size:0.75rem;color:var(--dw-gray-500);">Email professionnel en français</p>
          </div>
        </label>

        <label class="dw-card dw-card-interactive dw-row dw-gap-md" style="padding:0.875rem 1rem;margin:0;cursor:pointer;">
          <input type="radio" name="target_format" value="professional_arabic_message"
                 style="width:20px;height:20px;accent-color:var(--dw-teal-600);flex-shrink:0;">
          <div>
            <p style="margin:0;font-size:0.875rem;font-weight:600;color:var(--dw-gray-800);">رسالة مهنية بالعربية</p>
            <p style="margin:0;font-size:0.75rem;color:var(--dw-gray-500);">رسالة رسمية باللغة العربية الفصحى</p>
          </div>
        </label>

        <label class="dw-card dw-card-interactive dw-row dw-gap-md" style="padding:0.875rem 1rem;margin:0;cursor:pointer;">
          <input type="radio" name="target_format" value="polished_darija_whatsapp"
                 style="width:20px;height:20px;accent-color:var(--dw-teal-600);flex-shrink:0;">
          <div>
            <p style="margin:0;font-size:0.875rem;font-weight:600;color:var(--dw-gray-800);">رسالة واتساب بدارجة مزيانة</p>
            <p style="margin:0;font-size:0.75rem;color:var(--dw-gray-500);">دارجة مفهومة و محترمة</p>
          </div>
        </label>

        <label class="dw-card dw-card-interactive dw-row dw-gap-md" style="padding:0.875rem 1rem;margin:0;cursor:pointer;">
          <input type="radio" name="target_format" value="short_reply"
                 style="width:20px;height:20px;accent-color:var(--dw-teal-600);flex-shrink:0;">
          <div>
            <p style="margin:0;font-size:0.875rem;font-weight:600;color:var(--dw-gray-800);">جواب قصير</p>
            <p style="margin:0;font-size:0.75rem;color:var(--dw-gray-500);">رد سريع و مختصر</p>
          </div>
        </label>

      </div>
    </div>

    <!-- Tone -->
    <div class="dw-form-group" style="margin:0;">
      <label class="dw-form-label" for="id_tone">الأسلوب</label>
      <select id="id_tone" name="tone" class="dw-input dw-select">
        <option value="polite">مهذب</option>
        <option value="formal">رسمي</option>
        <option value="friendly">ودي</option>
        <option value="polite_firm">مهذب و حازم</option>
        <option value="neutral">محايد</option>
      </select>
    </div>

    <!-- Credit cost -->
    <div class="dw-row dw-gap-sm" style="padding:0 0.25rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--dw-gray-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span class="dw-text-sm" style="color:var(--dw-danger);">هاد العملية غادي تستعمل <strong style="color:var(--dw-teal-600);">{{credit}} كريدي</strong> — رصيدك: <strong style="color:var(--dw-teal-600);">{{ balance }}</strong></span>
    </div>

    <button type="submit" class="dw-btn dw-btn-primary dw-btn-block dw-btn-lg">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      توليد الرسالة
    </button>
  </form>

</div>
{% endblock %}
